<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Walid Gourideche</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #06080f;
            --card: rgba(15, 23, 42, 0.88);
            --border: rgba(148, 163, 184, 0.22);
            --text: #f8fafc;
            --muted: #cbd5e1;
            --accent: #60a5fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Poppins", "Inter", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 34%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
                var(--bg);
        }

        main {
            width: min(100%, 540px);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--card);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.9rem, 5vw, 2.6rem);
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 999px;
            color: #03111f;
            background: linear-gradient(135deg, #7dd3fc, var(--accent));
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>You're offline.</h1>
        <p>The cached portfolio shell is available, but this page was not saved for offline use. Reconnect to the internet and try again.</p>
        <a href="/">Return to portfolio</a>
    </main>
</body>
</html>
