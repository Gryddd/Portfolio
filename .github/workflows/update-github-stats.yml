name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

jobs:
  sync-github-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh GitHub stats data
        env:
          GITHUB_USERNAME: Gryddd
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-github-stats.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/github-stats.json; then
            echo "GitHub stats are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-stats.json
          git commit -m "chore: refresh GitHub stats"
          git push
